---
name: reconcile-target

"on":
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
    outputs:
      has_mirror_targets:
        description: Whether any configured targets define target_mirror_path.
        value: ${{ jobs.sync.outputs.has_mirror_targets }}
    secrets:
      BWS_ACCESS_TOKEN:
        required: true
      BWS_PROJECT_ID:
        required: true

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      has_mirror_targets: ${{ steps.config_meta.outputs.has_mirror_targets }}
    concurrency:
      group: reconcile-${{ inputs.mode }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Checkout shared sync config
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: shared-common/gh-actions-cfg
          ref: main
          path: .sync-config
          persist-credentials: false

      - name: Setup Python
        # actions/setup-python v6.1.0
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: "3.13"

      - name: Resolve config path and secret list
        id: config_meta
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          case "${MODE}" in
            external)
              config_path=".sync-config/gh-actions-glab/gl_forks_ext.json"
              ;;
            internal)
              config_path=".sync-config/gh-actions-glab/gl_forks_int.json"
              ;;
            *)
              printf '%s\n' "Unsupported mode: ${MODE}" >&2
              exit 1
              ;;
          esac
          has_mirror_targets="$(python3 -c 'import json, sys; from pathlib import Path; payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")); targets = payload.get("targets", []); print("true" if any(str(item.get("target_mirror_path") or "").strip() for item in targets if isinstance(item, dict)) else "false")' "${config_path}")"
          printf 'has_mirror_targets=%s\n' "${has_mirror_targets}" >> "${GITHUB_OUTPUT}"
          printf 'secrets=%s\n' \
            "GL_BASE_URL,GL_PAT_FORK_GLAB_SVC,GL_BRIDGE_FORK_USER_GLAB,GIT_BRANCH_PREFIX,GIT_BRANCH_MAIN,GIT_BRANCH_STAGING,GIT_BRANCH_RELEASE,GIT_BRANCH_REV" \
            >> "${GITHUB_OUTPUT}"
          printf 'config_path=%s\n' "${config_path}" >> "${GITHUB_OUTPUT}"

      - name: Fetch reconcile secrets from BWS
        uses: >-
          shared-common/gh-actions-shared/.github/actions/bws-fetch@v0.0.41
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ vars.BWS_VERSION }}
          bws-sha256: ${{ vars.BWS_SHA256 }}
          secrets: ${{ steps.config_meta.outputs.secrets }}
          output-dir: .secrets

      - name: Mask fetched reconcile secrets
        shell: bash
        env:
          SECRET_NAMES: ${{ steps.config_meta.outputs.secrets }}
        run: |
          set -euo pipefail
          python3 .github/scripts/mask_secret_files.py

      - name: Plan sync targets
        id: plan
        shell: bash
        env:
          SYNC_MODE: ${{ inputs.mode }}
          OUTPUT_PATH: plan.json
          SUMMARY_PATH: plan.md
          TARGETS_CONFIG_PATH: ${{ steps.config_meta.outputs.config_path }}
        run: |
          set -euo pipefail
          python3 .github/scripts/plan_sync.py

      - name: Publish plan summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f plan.md ]; then
            cat plan.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Reconcile queued targets
        if: steps.plan.outputs.should_run == 'true'
        shell: bash
        env:
          SYNC_MODE: ${{ inputs.mode }}
          PLAN_PATH: plan.json
          OUTPUT_PATH: reconcile.json
          SUMMARY_PATH: reconcile.md
          TARGETS_CONFIG_PATH: ${{ steps.config_meta.outputs.config_path }}
        run: |
          set -euo pipefail
          python3 .github/scripts/reconcile_planned_targets.py

      - name: Publish reconcile summary
        if: always() && steps.plan.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f reconcile.md ]; then
            cat reconcile.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets
